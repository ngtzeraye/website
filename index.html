<!DOCTYPE html>
<html lang="en">
<head>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>

        }

</head>
<body class="font-sans text-gray-900 antialiased selection:bg-blue-200 bg-gray-50">
    <div id="app"></div>

    <script>
        // --- MOCK DATA ---
        const DOCTORS = [
            { id: 1, name: "Dr. Sarah Jenkins", specialty: "Cardiologist", rating: 4.9, reviews: 128, price: "$150", availability: "Available Today", bg: "bg-blue-100", color: "text-blue-600" },
            { id: 2, name: "Dr. Michael Chen", specialty: "General Practitioner", rating: 4.8, reviews: 342, price: "$80", availability: "Available in 30 mins", bg: "bg-emerald-100", color: "text-emerald-600" },
            { id: 3, name: "Dr. Emily Rodriguez", specialty: "Dermatologist", rating: 4.7, reviews: 89, price: "$120", availability: "Available Tomorrow", bg: "bg-purple-100", color: "text-purple-600" },
            { id: 4, name: "Dr. James Wilson", specialty: "Pediatrician", rating: 4.9, reviews: 412, price: "$100", availability: "Available Today", bg: "bg-orange-100", color: "text-orange-600" },
            { id: 5, name: "Dr. Anita Patel", specialty: "Neurologist", rating: 4.6, reviews: 76, price: "$200", availability: "Available Friday", bg: "bg-indigo-100", color: "text-indigo-600" },
            { id: 6, name: "Dr. David Kim", specialty: "Psychiatrist", rating: 4.8, reviews: 156, price: "$140", availability: "Available Today", bg: "bg-rose-100", color: "text-rose-600" }
        ];

        // --- APP STATE ---
        let state = {
            view: 'home', // home, doctors, dashboard, booking, call, symptom-checker
            isMobileMenuOpen: false,
            user: { name: "Alex Johnson", isLoggedIn: true },
            appointments: [
                { id: 101, doctor: DOCTORS[1], date: "Today", time: "14:30 PM", status: "upcoming" }
            ],
            selectedDoctor: null,
            activeCall: null,
            chatHistory: [
                { role: 'model', text: "Hello! I am the CareConnect AI Symptom Checker. Please tell me what symptoms you are experiencing today.\n\n*Disclaimer: I am an AI, not a human doctor. For medical emergencies or if you are truly unsure, please visit a doctor or emergency room immediately.*" }
            ],
            isTyping: false,
            customApiKey: "" // Allows users to input their own API key on GitHub/external hosts
        };

        // --- GEMINI API INTEGRATION ---
        const apiKey = "";
        
        async function callGeminiAPI() {
            const hasCustomKey = state.customApiKey && state.customApiKey.trim() !== "";
            const activeKey = hasCustomKey ? state.customApiKey.trim() : apiKey;
            
            // Public API keys cannot access the internal preview model.
            // We use a fallback array to gracefully handle 404 Model Not Found errors.
            const modelsToTry = hasCustomKey 
                ? ['gemini-1.5-flash', 'gemini-2.0-flash', 'gemini-1.5-pro'] 
                : ['gemini-2.5-flash-preview-09-2025'];
            let currentModelIndex = 0;
            
            const systemPrompt = `You are a helpful and professional general practitioner AI symptom checker for a telemedicine website.
1. Ask the user for their symptoms if they haven't provided enough detail.
2. List possible common illnesses based on the symptoms.
3. Advise whether a doctor's visit is necessary based on the severity.
4. Suggest how to prevent spreading the illness to others if applicable.
5. Suggest proper home treatments if the illness is not severe.
6. If you are not confident, explicitly state so and suggest going to a doctor for a proper checkup.
7. LEGAL DISCLAIMER REQUIRED: Always include a disclaimer reminding the user that you are an AI and they should visit a doctor if they are truly unsure or if symptoms worsen. 
Keep all responses safe, clean, healthy, and age-appropriate (under 18). Do not discuss harmful, illegal, or mature topics. Format responses nicely using markdown bolding.`;

            // Prepare conversation history (Skip the first hardcoded greeting as API expects conversation to start with 'user')
            const contents = state.chatHistory
                .slice(1) // Skip the first model message
                .filter(msg => msg.text.trim() !== '') 
                .map(msg => ({
                    role: msg.role === 'user' ? 'user' : 'model',
                    parts: [{ text: msg.text }]
                }));
            
            const payload = {
                contents: contents,
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            // Exponential backoff logic: 1s, 2s, 4s, 8s, 16s
            let retries = 5;
            let delays = [1000, 2000, 4000, 8000, 16000];
            
            for (let i = 0; i < retries; i++) {
                let modelName = modelsToTry[currentModelIndex];
                let url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${activeKey}`;
                
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    const result = await response.json();
                    
                    if (!response.ok) {
                        // Specifically catch the 403 Missing API Key error
                        if (response.status === 403) {
                            return "Connection error (403 Permission Denied): Your API key is missing or invalid. Please check the API key you entered.";
                        }
                        
                        // Automatically fall back to older/alternative models if the current one throws a 404
                        if (response.status === 404) {
                            if (currentModelIndex < modelsToTry.length - 1) {
                                currentModelIndex++;
                                i--; // Do not count this model fallback as a rate-limit retry
                                continue; 
                            }
                            
                            // DIAGNOSTIC CHECK: If all fallbacks fail, fetch the available models for this specific key
                            try {
                                const listUrl = `https://generativelanguage.googleapis.com/v1beta/models?key=${activeKey}`;
                                const listRes = await fetch(listUrl);
                                const listData = await listRes.json();
                                const available = listData.models ? listData.models.map(m => m.name.replace('models/', '')).filter(name => name.includes('gemini')).join(', ') : 'unknown';
                                return `Connection error (404 Model Not Found): Your API key is valid, but the standard models aren't enabled for it. \n\n**Models available to your key:** ${available}. \n\nIf you see 'gemini' models listed here, you may need to enable the Generative Language API in Google Cloud.`;
                            } catch(e) {
                                return `Connection error (404 Model Not Found): None of the available models are accessible with your API key. Please check your Google Cloud region and Generative Language API permissions.`;
                            }
                        }
                        
                        throw new Error(result.error?.message || `API Request failed with status ${response.status}`);
                    }
                    
                    return result.candidates?.[0]?.content?.parts?.[0]?.text || "I'm sorry, I couldn't generate a response.";
                } catch (error) {
                    if (i === retries - 1) {
                        return `Connection error: ${error.message}. Please try again later.`;
                    }
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        // --- GLOBAL ACTIONS ---
        window.navigate = function(newView) {
            state.view = newView;
            state.isMobileMenuOpen = false;
            window.scrollTo(0, 0);
            renderApp();
        };

        window.toggleMobileMenu = function() {
            state.isMobileMenuOpen = !state.isMobileMenuOpen;
            renderApp();
        };

        window.handleBookAppointment = function(doctorId) {
            state.selectedDoctor = DOCTORS.find(d => d.id === doctorId);
            window.navigate('booking');
        };

        window.confirmBooking = function(date, time) {
            const newAppointment = {
                id: Math.floor(Math.random() * 10000),
                doctor: state.selectedDoctor,
                date: date || "Tomorrow",
                time: time || "10:00 AM",
                status: "upcoming"
            };
            state.appointments.push(newAppointment);
            window.navigate('dashboard');
        };

        window.joinCall = function(appointmentId) {
            state.activeCall = state.appointments.find(a => a.id === appointmentId);
            window.navigate('call');
        };

        window.endCall = function() {
            state.activeCall = null;
            window.navigate('dashboard');
        };

        window.handleSendMessage = async function(event) {
            event.preventDefault();
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) return;

            // Add user message to UI
            state.chatHistory.push({ role: 'user', text: message });
            state.isTyping = true;
            renderApp();
            
            // Scroll to bottom
            setTimeout(() => {
                const chatBox = document.getElementById('chat-container');
                if (chatBox) chatBox.scrollTop = chatBox.scrollHeight;
            }, 50);

            // Fetch response
            const responseText = await callGeminiAPI();
            
            state.chatHistory.push({ role: 'model', text: responseText });
            state.isTyping = false;
            renderApp();
            
            setTimeout(() => {
                const chatBox = document.getElementById('chat-container');
                const inputRef = document.getElementById('chat-input');
                if (chatBox) chatBox.scrollTop = chatBox.scrollHeight;
                if (inputRef) inputRef.focus();
            }, 50);
        };

        // --- COMPONENTS (Template Generators) ---

        function renderNavbar() {
            return `
                <nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
                    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div class="flex justify-between h-16">
                            <div class="flex items-center cursor-pointer" onclick="navigate('home')">
                                <i data-lucide="heart-pulse" class="h-8 w-8 text-blue-600"></i>
                                <span class="ml-2 text-xl font-bold text-gray-900 tracking-tight">CareConnect</span>
                            </div>
                            
                            <!-- Desktop Nav -->
                            <div class="hidden md:flex items-center space-x-8">
                                <button onclick="navigate('home')" class="text-sm font-medium ${state.view === 'home' ? 'text-blue-600' : 'text-gray-600 hover:text-gray-900'}">Home</button>
                                <button onclick="navigate('doctors')" class="text-sm font-medium ${state.view === 'doctors' ? 'text-blue-600' : 'text-gray-600 hover:text-gray-900'}">Find a Doctor</button>
                                <button onclick="navigate('symptom-checker')" class="text-sm font-medium flex items-center ${state.view === 'symptom-checker' ? 'text-blue-600' : 'text-gray-600 hover:text-gray-900'}"><i data-lucide="bot" class="h-4 w-4 mr-1"></i> Symptom Checker</button>
                                ${state.user.isLoggedIn ? `
                                    <button onclick="navigate('dashboard')" class="text-sm font-medium ${state.view === 'dashboard' ? 'text-blue-600' : 'text-gray-600 hover:text-gray-900'}">Dashboard</button>
                                ` : ''}
                                
                                <div class="flex items-center space-x-4 ml-4 border-l border-gray-200 pl-4">
                                    ${state.user.isLoggedIn ? `
                                        <div class="flex items-center space-x-3">
                                            <button class="text-gray-400 hover:text-gray-600">
                                                <i data-lucide="bell" class="h-5 w-5"></i>
                                            </button>
                                            <div class="h-8 w-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-sm cursor-pointer border border-blue-200" onclick="navigate('dashboard')">
                                                ${state.user.name.charAt(0)}
                                            </div>
                                        </div>
                                    ` : `
                                        <button class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors">
                                            Log In
                                        </button>
                                    `}
                                </div>
                            </div>

                            <!-- Mobile menu button -->
                            <div class="flex items-center md:hidden">
                                <button onclick="toggleMobileMenu()" class="text-gray-500 hover:text-gray-700">
                                    <i data-lucide="${state.isMobileMenuOpen ? 'x' : 'menu'}" class="h-6 w-6"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Mobile Menu -->
                    ${state.isMobileMenuOpen ? `
                        <div class="md:hidden bg-white border-b border-gray-100 px-2 pt-2 pb-3 space-y-1 sm:px-3">
                            <button onclick="navigate('home')" class="block w-full text-left px-3 py-2 text-base font-medium text-gray-700 hover:text-blue-600 hover:bg-gray-50 rounded-md">Home</button>
                            <button onclick="navigate('doctors')" class="block w-full text-left px-3 py-2 text-base font-medium text-gray-700 hover:text-blue-600 hover:bg-gray-50 rounded-md">Find a Doctor</button>
                            <button onclick="navigate('symptom-checker')" class="block w-full text-left px-3 py-2 text-base font-medium text-gray-700 hover:text-blue-600 hover:bg-gray-50 rounded-md flex items-center"><i data-lucide="bot" class="h-4 w-4 mr-2"></i> Symptom Checker</button>
                            ${state.user.isLoggedIn ? `
                                <button onclick="navigate('dashboard')" class="block w-full text-left px-3 py-2 text-base font-medium text-gray-700 hover:text-blue-600 hover:bg-gray-50 rounded-md">Dashboard</button>
                            ` : ''}
                        </div>
                    ` : ''}
                </nav>
            `;
        }

        function renderHomeView() {
            const features = [
                { icon: "clock", title: "No Waiting Rooms", desc: "See a doctor in minutes, not days. Available 24/7 from anywhere." },
                { icon: "shield", title: "Secure & Private", desc: "HIPAA compliant platform ensuring your medical data is completely safe." },
                { icon: "file-text", title: "Digital Prescriptions", desc: "Prescriptions sent instantly to your local pharmacy for easy pickup." }
            ];

            return `
                <div class="bg-gray-50 pb-12">

                                        <span class="block text-blue-600 xl:inline">from your home.</span>

                                    <p class="mt-3 text-base text-gray-500 sm:mt-5 sm:text-xl lg:text-lg xl:text-xl">

                                    <div class="mt-8 sm:max-w-lg sm:mx-auto sm:text-center lg:text-left lg:mx-0 flex flex-col sm:flex-row gap-4">

                                            Find a Doctor
                                        </button>
                                        <button onclick="navigate('dashboard')" class="w-full sm:w-auto px-8 py-3 border border-gray-200 text-base font-medium rounded-xl text-gray-700 bg-white hover:bg-gray-50 md:py-4 md:text-lg shadow-sm transition-all flex items-center justify-center">
                                            <i data-lucide="video" class="h-5 w-5 mr-2 text-gray-500"></i> Test Device
                                        </button>
                                    </div>
                                </div>
                                <div class="mt-12 relative sm:max-w-lg sm:mx-auto lg:mt-0 lg:max-w-none lg:mx-0 lg:col-span-6 lg:flex lg:items-center">
                                    <div class="relative mx-auto w-full rounded-2xl shadow-xl lg:max-w-md overflow-hidden bg-gray-100 aspect-[4/3] flex items-center justify-center group cursor-pointer border border-gray-200">
                                        <div class="absolute inset-0 bg-gradient-to-tr from-blue-100 to-indigo-50 opacity-90"></div>
                                        <div class="relative z-10 w-full h-full flex flex-col p-6 justify-between">
                                            <div class="flex justify-between items-center bg-white/80 backdrop-blur-sm p-3 rounded-xl shadow-sm">
                                                <div class="flex items-center space-x-3">
                                                    <div class="h-10 w-10 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 font-bold">Dr</div>
                                                    <div>
                                                        <div class="text-sm font-bold text-gray-900">Dr. Sarah Jenkins</div>
                                                        <div class="text-xs text-gray-500">Cardiologist • Online</div>
                                                    </div>
                                                </div>
                                                <div class="h-8 w-8 bg-green-100 rounded-full flex items-center justify-center">
                                                    <i data-lucide="video" class="h-4 w-4 text-green-600"></i>

                                            </div>
                                            
                                            <div class="self-end bg-blue-600 text-white p-3 rounded-xl rounded-tr-none shadow-md max-w-[80%] mt-4">
                                                <p class="text-sm">Hello Alex, your test results look great. How are you feeling today?</p>
                                            </div>
                                            
                                            <div class="self-start bg-white p-3 rounded-xl rounded-tl-none shadow-md max-w-[80%] mt-2">
                                                <p class="text-sm text-gray-700">Much better, thank you doctor. The new medication is helping.</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                        </div>
                    </div>

                    <!-- Features Section -->
                    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
                        <div class="text-center mb-12">
                            <h2 class="text-base text-blue-600 font-semibold tracking-wide uppercase">Why Choose Us</h2>
                            <p class="mt-2 text-3xl leading-8 font-extrabold tracking-tight text-gray-900 sm:text-4xl">
                                A better way to get healthcare
                            </p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                            ${features.map(f => `
                                <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 hover:shadow-md transition-shadow">

                        <div class="mb-6 flex flex-col sm:flex-row sm:justify-between sm:items-end gap-4">
                            <div>

                                <p class="text-gray-500 mt-1">Get initial guidance on your symptoms before seeing a doctor.</p>
                            </div>
                        </div>
                        
                        <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-6 flex items-start space-x-3 shadow-sm">

                            </div>
                        </div>

                        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 flex-1 flex flex-col overflow-hidden h-[500px]">
                            <!-- Chat Header -->
                            <div class="p-4 border-b border-gray-100 bg-white flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">

                                        id="user-api-key" 
                                        placeholder="Enter Gemini API Key..." 
                                        class="text-xs px-3 py-1.5 border border-gray-200 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 w-full sm:w-48 shadow-sm transition-all"

                                        oninput="state.customApiKey = this.value"
                                        title="Provide your Gemini API Key if hosting outside the preview environment"
                                    />
                                    <button onclick="state.chatHistory = [state.chatHistory[0]]; renderApp();" class="text-xs text-gray-600 hover:text-blue-600 flex items-center bg-gray-50 hover:bg-blue-50 px-3 py-1.5 rounded-lg border border-gray-200 hover:border-blue-200 transition-colors shadow-sm shrink-0">

                                </div>
                            </div>

                            <!-- Chat Messages -->
                            <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-6 bg-gray-50/50">
                                ${state.chatHistory.map(msg => `
                                    <div class="flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}">

                                            </div>

                                    </div>
                                `).join('')}
                                
                                ${state.isTyping ? `
                                    <div class="flex justify-start">
                                        <div class="flex max-w-[80%] flex-row items-end">
                                            <div class="shrink-0 h-8 w-8 rounded-full flex items-center justify-center bg-gradient-to-br from-blue-500 to-indigo-600 text-white mr-2 shadow-sm">

                                                <div class="h-1.5 w-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.3s"></div>
                                            </div>
                                        </div>

                                ` : ''}
                            </div>

                            <!-- Chat Input -->
                            <form onsubmit="handleSendMessage(event)" class="p-4 bg-white border-t border-gray-100">
                                <div class="flex items-center space-x-3">
                                    <input 
                                        type="text"

        // --- CORE RENDER FUNCTION ---
        function renderApp() {
            const app = document.getElementById('app');
            let html = '';
            
            if (state.view !== 'call') html += renderNavbar();
            
            html += '<main>';
            switch (state.view) {
                case 'home': html += renderHomeView(); break;
                case 'symptom-checker': html += renderSymptomCheckerView(); break;
                case 'doctors': html += renderDoctorsView(); break;
                case 'booking': html += renderBookingView(); break;
                case 'dashboard': html += renderDashboardView(); break;
                case 'call': html += renderVideoCallView(); break;
            }
            html += '</main>';

            if (state.view !== 'call') html += renderFooter();
            
            app.innerHTML = html;
            
            // Re-initialize Lucide Icons after modifying DOM
            lucide.createIcons();
        }

        // Initial render
        renderApp();
